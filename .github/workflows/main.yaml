name: main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VIRTUALENV_ACTIVATORS: "bash,python"

jobs:
  check-branch:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: check-branch-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if the PR's branch is updated
        uses: osl-incubator/gh-check-pr-is-updated@1.0.0
        with:
          remote_branch: origin/main
          pr_sha: ${{ github.event.pull_request.head.sha }}

  package-tests:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python_version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        os:
          - "ubuntu"
          # - "macos"
          # - "windows"
    runs-on: ${{ matrix.os }}-latest
    concurrency:
      group: ci-package-tests-${{ matrix.os }}-${{ matrix.python_version }}-${{ github.ref }}
      cancel-in-progress: true

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          environment-file: conda/dev.yaml
          channels: conda-forge,nodefaults
          activate-environment: prismaflow
          auto-update-conda: true
          conda-solver: libmamba
          python-version: ${{ matrix.python_version }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry check
          poetry install

      - name: Run package unit tests
        run: makim prisma-flow.unittests

  package-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash -l {0}

    concurrency:
      group: ci-package-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          environment-file: conda/dev.yaml
          channels: conda-forge,nodefaults
          activate-environment: prismaflow
          auto-update-conda: true
          conda-solver: libmamba
          python-version: "3.10"

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry check
          poetry install

      - name: Build package
        run: makim prisma-flow.build

  linter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash -l {0}

    concurrency:
      group: ci-linter-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          environment-file: conda/dev.yaml
          channels: conda-forge,nodefaults
          activate-environment: prismaflow
          auto-update-conda: true
          conda-solver: libmamba
          python-version: "3.10"

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install

      - name: Run style checks
        if: success() || failure()
        run: makim all.lint

      - name: Setup tmate session
        if: "${{ failure() && (contains(github.event.pull_request.labels.*.name, 'ci:enable-debugging')) }}"
        uses: mxschmitt/action-tmate@v3
