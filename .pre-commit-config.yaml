default_stages:
  - pre-commit
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v3.0.2"
    hooks:
      - id: prettier

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: ruff format
        language: system
        pass_filenames: true
        types:
          - python

      - id: ruff-check
        name: ruff-check
        entry: ruff check
        language: system
        pass_filenames: true
        types:
          - python

      - id: douki
        name: douki
        entry: douki sync
        language: system
        pass_filenames: true
        require_serial: yes
        files: ^src/prismaflow/.*\.py$
        types:
          - python

      - id: mypy
        name: mypy
        entry: mypy src
        files: ^src/prismaflow/.*\.py$
        language: system
        pass_filenames: false
        types:
          - python
