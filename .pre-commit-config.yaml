default_stages:
  - pre-commit
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v3.0.2"
    hooks:
      - id: prettier

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: ruff format --config pyproject.toml
        files: ^(src/prisma_flow|tests)/.*\.py$
        language: system
        pass_filenames: true
        types:
          - python

      - id: ruff-check
        name: ruff-check
        entry: ruff check --config pyproject.toml
        files: ^(src/prisma_flow|tests)/.*\.py$
        language: system
        pass_filenames: true
        types:
          - python

      - id: mypy
        name: mypy
        entry: mypy src tests
        files: ^(src/prisma_flow|tests)/.*\.py$
        language: system
        pass_filenames: false
        types:
          - python

      - id: bandit
        name: bandit
        entry: bandit
        language: system
        args: ["--configfile", "pyproject.toml", "-iii", "-lll"]
        files: ^src/prisma_flow/.*\.py$
        pass_filenames: true
        types:
          - python

      - id: vulture
        name: vulture
        entry: vulture --min-confidence 80
        language: system
        files: ^src/prisma_flow/.*\.py$
        description: Find unused Prisma Flow Python code.
        pass_filenames: true
        types:
          - python

      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types_or:
          - sh
          - shell
          - bash
